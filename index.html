<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Cinematic Video Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated background -->
  <div class="background"></div>

  <!-- HERO SECTION -->
  <header class="hero">
    <h1>🎬 Cinematic Video Studio</h1>
    <p>High-quality video experience built with GitHub Pages</p>

    <a href="#video" class="btn">▶ Watch Now</a>
  </header>

  <!-- VIDEO SECTION -->
  <section id="video" class="video-section">
    <h2>Featured Video</h2>

    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </section>

  <!-- INFO SECTION -->
  <section class="info">
    <div class="card">⚡ Fast Loading</div>
    <div class="card">🔒 Secure HTTPS</div>
    <div class="card">📱 Mobile Friendly</div>
  </section>

  <footer>
    <p>© 2026 Cinematic Site | Built with GitHub Pages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

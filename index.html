<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultra Video Studio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <h1>🎬 Ultra Video Studio</h1>

    <input type="text" id="search" placeholder="Search videos...">

    <button onclick="toggleTheme()">🌙 Theme</button>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">
    <div class="card">🎞 Videos: 3</div>
    <div class="card">🔥 Views: 1.2K</div>
    <div class="card">⚡ Status: Online</div>
  </section>

  <!-- VIDEO GRID -->
  <section class="grid" id="videoGrid">

    <div class="video-card" onclick="openVideo('video1.mp4')">
      <h3>Video 1</h3>
    </div>

    <div class="video-card" onclick="openVideo('video2.mp4')">
      <h3>Video 2</h3>
    </div>

    <div class="video-card" onclick="openVideo('video3.mp4')">
      <h3>Video 3</h3>
    </div>

  </section>

  <!-- VIDEO MODAL -->
  <div id="modal" class="modal">
    <span onclick="closeVideo()">✖</span>

    <video id="player" controls>
      <source id="source" src="">
    </video>
  </div>

  <footer>
    <p>© Ultra Studio | GitHub Pages Powered</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
